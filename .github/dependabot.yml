# FilaOps Dependabot Configuration
# Keeps Python (backend), Node (frontend), and GitHub Actions dependencies current
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# All version updates are grouped into a single PR per ecosystem to avoid
# spamming the repo with individual PRs. Security updates are grouped separately.

version: 2
updates:
  # Python backend (FastAPI)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(py):"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      pip-all:
        patterns: ["*"]

  # React frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(js):"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(ci):"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
