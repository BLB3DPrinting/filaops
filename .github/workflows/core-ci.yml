# Core CI — GitHub Actions port of .circleci/config.yml (core-ci workflow).
#
# Why Actions: workflows live in the repo, so they run automatically and follow
# the repo across org transfers — no OAuth app approval / "set up project" step
# (which is what broke after the move to the BLB3DPrinting org).
#
# Jobs mirror the CircleCI jobs 1:1, including the dependency graph. After this
# lands, repoint branch protection's required checks from `ci/circleci: core-*`
# to these Actions job names: core-diff, core-pro-guard, core-backend-static,
# core-backend-tests, core-frontend-build, core-frontend-unit.
name: core-ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: core-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Whitespace / conflict-marker check against main (CircleCI: core-diff)
  core-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Fetch main for diff checks
        run: git fetch origin main:refs/remotes/origin/main
      - name: Check whitespace and conflict markers
        run: git diff --check origin/main...HEAD

  # Sacred Rule guard: no PRO code in the public Core repo (CircleCI: core-pro-guard)
  core-pro-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Fetch main for diff checks
        run: git fetch origin main:refs/remotes/origin/main
      - name: Assert Core repo has no PRO code
        shell: bash
        run: |
          set -euo pipefail
          if [ -e backend/app/pro ]; then
            echo "backend/app/pro found; PRO code must not be in the public Core repo."
            exit 1
          fi
          if [ -e license-server ]; then
            echo "license-server found; PRO code must not be in the public Core repo."
            exit 1
          fi
          pro_files="$(git diff --name-only origin/main...HEAD | grep -E '^(backend/app/pro($|/)|license-server($|/))' || true)"
          if [ -n "$pro_files" ]; then
            echo "Diff contains PRO-only paths:"
            echo "$pro_files"
            exit 1
          fi
          echo "No PRO code detected; public Core repo is clean."

  # Backend syntax check (CircleCI: core-backend-static)
  core-backend-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile backend Python files
        run: cd backend && python -m compileall -q app tests

  # Backend tests against Postgres (CircleCI: core-backend-tests)
  core-backend-tests:
    runs-on: ubuntu-latest
    needs: [core-diff, core-pro-guard, core-backend-static]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Admin
          POSTGRES_DB: filaops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: filaops
      DB_USER: postgres
      DB_PASSWORD: Admin
      DATABASE_URL: postgresql+psycopg://postgres:Admin@localhost:5432/filaops
      ENVIRONMENT: test
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      DEBUG: "false"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd backend
          mkdir -p ../test-results/core-backend
          python -m pytest -q --junitxml=../test-results/core-backend/pytest.xml
      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-backend-test-results
          path: test-results/core-backend
          if-no-files-found: ignore

  # Frontend production build (CircleCI: core-frontend-build)
  core-frontend-build:
    runs-on: ubuntu-latest
    needs: [core-diff, core-pro-guard]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:8001

  # Frontend unit tests (CircleCI: core-frontend-unit)
  core-frontend-unit:
    runs-on: ubuntu-latest
    needs: [core-diff, core-pro-guard]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Run frontend unit tests
        run: |
          cd frontend
          mkdir -p ../test-results/core-frontend-unit
          npm run test:unit -- --run --reporter=default --reporter=junit --outputFile=../test-results/core-frontend-unit/vitest.xml
      - name: Upload frontend unit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-frontend-unit-results
          path: test-results/core-frontend-unit
          if-no-files-found: ignore
