name: Review Council

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_target:
    types: [labeled]

# Cancel in-progress runs for the same PR
concurrency:
  group: review-council-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Default Review: GUARDIAN + ARCHITECT on every PR
  # Skipped if 'full-review' label is present
  # ──────────────────────────────────────────────────
  default-review:
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'full-review')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [guardian, architect]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read agent prompt
        id: prompt
        run: |
          {
            echo 'PROMPT<<PROMPT_EOF'
            cat .github/review-council/prompts/${{ matrix.agent }}.md
            echo ''
            echo '---'
            echo 'Review PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}'
            echo 'Base: ${{ github.event.pull_request.base.ref }} <- Head: ${{ github.event.pull_request.head.ref }}'
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.agent }} review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: >-
            --model claude-sonnet-4-5-20250929
            --max-turns 15
            --allowedTools "Read,Glob,Grep,Bash(grep:*),Bash(find:*),Bash(wc:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(npm audit:*),Bash(git log:*),Bash(git diff:*)"

  # ──────────────────────────────────────────────────
  # Full Review: All 6 agents when 'full-review' label applied
  # ──────────────────────────────────────────────────
  full-review:
    if: >-
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'full-review')) ||
      (github.event_name == 'pull_request_target' &&
       github.event.label.name == 'full-review')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [guardian, architect, sentinel, navigator, herald, operator]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Read agent prompt
        id: prompt
        run: |
          {
            echo 'PROMPT<<PROMPT_EOF'
            cat .github/review-council/prompts/${{ matrix.agent }}.md
            echo ''
            echo '---'
            echo 'Review PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}'
            echo 'Base: ${{ github.event.pull_request.base.ref }} <- Head: ${{ github.event.pull_request.head.ref }}'
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.agent }} review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: >-
            --model claude-sonnet-4-5-20250929
            --max-turns 20
            --allowedTools "Read,Glob,Grep,Bash(grep:*),Bash(find:*),Bash(wc:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(npm audit:*),Bash(git log:*),Bash(git diff:*)"
